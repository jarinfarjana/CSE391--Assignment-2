<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List · Jarin Farjana Jue</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-mark">JFJ</span>
      <span class="brand-name">Jarin Farjana Jue</span>
    </a>
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="stopwatch.html">Stopwatch</a>
      <a href="todo.html" class="active">To-Do</a>
    </nav>
  </header>

  <main>
    <h1 class="page-title">To-Do List</h1>
    <p class="page-lede" style="font-family: 'Times New Roman', Times, serif;"><strong><em>Dream- Plan-Do</em></strong></p>

    <form class="todo-form" id="todo-form">
      <input
        type="text"
        class="todo-input"
        id="todo-input"
        placeholder="Add a task..."
        aria-label="New task"
        autocomplete="off"
      >
      <button type="submit" class="todo-add-btn">Add</button>
    </form>

    <h2 class="todo-list-title">Task List</h2>
    <ul class="todo-list" id="todo-list"></ul>

    <p class="todo-meta" id="todo-meta"></p>
  </main>

  <footer class="site-footer">
    Made by <strong>Jarin Farjana Jue</strong> 
    <p id="last-modified"></p>
  </footer>

  <script src="todo.js"></script>
</body>
</html>
